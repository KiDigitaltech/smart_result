<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDADI YA WANAFAMILIA WATAKAOSAFIRI KUELEKEA MOSHI KUTOKEA DAR ES SALAAM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  color: #fff;
  margin: 0;
  padding: 0;
}
h1 {
  text-align: center;
  padding: 25px 10px;
  font-size: 28px;
  background: rgba(0,0,0,0.2);
  margin: 0;
  letter-spacing: 1px;
}
.count { text-align: center; font-size: 20px; margin: 10px 0; font-weight: bold; transition: transform 0.3s; }
.count.bounce { transform: scale(1.3); }
form {
  max-width: 500px;
  margin: 20px auto;
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
  transition: transform 0.3s;
}
form.animate { transform: scale(1.03); }
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}
input:focus { outline: none; box-shadow: 0 0 10px #fff; }
button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  font-size: 18px;
  background: #ff4b2b;
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  position: relative;
}
button:hover { background: #ff416c; transform: scale(1.05); }
button:disabled { background: #555; cursor: not-allowed; }
button .loader {
  border: 3px solid #fff;
  border-top: 3px solid transparent;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  animation: spin 1s linear infinite;
  position: absolute;
  top: 50%;
  left: 50%;
  margin: -9px 0 0 -9px;
  display: none;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

table { width: 90%; margin: 20px auto 50px auto; border-collapse: collapse; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
table, th, td { border: 1px solid #fff; }
th, td { padding: 12px; text-align: center; }
th { background: rgba(0,0,0,0.3); font-weight: bold; }

.new-row {
  animation: highlightRow 2s ease;
}
@keyframes highlightRow {
  0% { background-color: #f1c40f; transform: scale(1.05); }
  50% { background-color: #f39c12; transform: scale(1.02); }
  100% { background-color: rgba(255,255,255,0.1); transform: scale(1); }
}

.dataTables_filter input { border-radius: 12px !important; padding: 8px !important; margin-left: 5px; }
</style>
</head>
<body>

<h1>IDADI YA WANAFAMILIA WATAKAOSAFIRI KUELEKEA MOSHI KUTOKEA DAR ES SALAAM</h1>
<div class="count">Jumla ya Watakaosafiri: <span id="totalCount">0</span></div>

<form id="travelForm">
  <input type="text" id="name" placeholder="Jina Kamili" required>
  <input type="tel" id="phone" placeholder="Namba ya Simu" required>
  <button type="submit">Jiandikishe
    <div class="loader"></div>
  </button>
</form>

<table id="travelersTable">
  <thead>
    <tr>
      <th>#</th>
      <th>Jina</th>
      <th>Namba ya Simu</th>
      <th>Muda wa Kujiandikisha</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBp4M1HvXQtDURFLiUft-yRGGNhm3BPjB4",
  authDomain: "smartcollect-94fed.firebaseapp.com",
  projectId: "smartcollect-94fed",
  storageBucket: "smartcollect-94fed.firebasestorage.app",
  messagingSenderId: "934601828160",
  appId: "1:934601828160:web:328de1daaf67beb7363ca5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const form = document.getElementById('travelForm');
const totalCountEl = document.getElementById('totalCount');
const countDiv = document.querySelector('.count');
const submitBtn = form.querySelector('button');
const loader = submitBtn.querySelector('.loader');

let isSubmitting = false;
let dataTable;

// Initialize DataTable
$(document).ready(function(){
  dataTable = $('#travelersTable').DataTable({
    paging:true,
    searching:true
  });
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if(isSubmitting) return;
  isSubmitting = true;
  submitBtn.disabled = true;
  loader.style.display = 'block';

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if(!name || !phone){
    Swal.fire('Kosa!', 'Tafadhali jaza zote fields.', 'error');
    resetButton();
    return;
  }

  try {
    const querySnapshot = await db.collection('travelers')
      .where('name','==',name).get();

    if(!querySnapshot.empty){
      Swal.fire('Kumbuka!', 'Jina hili tayari limejisajili.', 'warning');
      resetButton();
      return;
    }

    await db.collection('travelers').add({
      name, phone, timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    Swal.fire({
      icon: 'success',
      title: 'Usajili umefanikiwa!',
      text: `${name} amesajiliwa.`,
      timer: 2000,
      showConfirmButton: false
    });

    form.reset();
  } catch(error){
    console.error(error);
    Swal.fire('Kosa!', 'Kuna tatizo, jaribu tena.', 'error');
  } finally {
    resetButton();
  }
});

function resetButton(){
  isSubmitting = false;
  submitBtn.disabled = false;
  loader.style.display = 'none';
}

// Auto-update table using onSnapshot()
db.collection('travelers').orderBy('timestamp','desc')
.onSnapshot(snapshot => {
  dataTable.clear().draw();
  let count = 1;
  snapshot.forEach(doc => {
    const data = doc.data();
    const time = data.timestamp ? data.timestamp.toDate().toLocaleString() : '-';
    const rowNode = dataTable.row.add([
      count,
      data.name,
      data.phone,
      time
    ]).draw(false).node();
    $(rowNode).addClass('new-row');
    count++;
  });
  // Update total count with bounce
  totalCountEl.textContent = snapshot.size;
  countDiv.classList.add('bounce');
  setTimeout(()=>countDiv.classList.remove('bounce'),300);
});
</script>

</body>
</html>
